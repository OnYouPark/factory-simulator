<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Factory Simulator</title>
  <link rel="stylesheet" href="assets/style.css" />

  <!-- Three.js는 jsdelivr CDN을 통해 ES Module로 로딩한다.
       importmap을 쓰면 main.js에서 `from 'three'`처럼 깔끔하게 import 가능. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- 상단 툴바: 좌측에 제목, 우측은 이후 컨트롤 버튼을 위한 빈 자리 -->
  <header id="toolbar">
    <div class="toolbar-left">
      <span class="title">Factory Simulator</span>
    </div>
    <div class="toolbar-right">
      <!-- Stage 4: 시뮬레이션 제어 (일시정지/리셋 + 시뮬레이션 시간 + 시간 가속 슬라이더) -->
      <div class="time-controls">
        <button id="btn-pause" class="ctrl-btn" title="일시정지/재생">⏸</button>
        <button id="btn-reset" class="ctrl-btn" title="리셋">🔄</button>
        <span class="time-display">
          시뮬레이션 시간: <span id="sim-time">00:00:00</span>
        </span>
        <label class="speed-control">
          속도: <span id="speed-display">30x</span>
          <input type="range" id="speed-slider" min="0" max="5" value="2" step="1">
        </label>
      </div>
    </div>
  </header>

  <!-- 메인 영역: 좌측 3D 캔버스 + 우측 KPI 대시보드 패널 -->
  <main id="main">
    <div id="canvas-container">
      <!-- scene.js에서 생성한 renderer.domElement가 이 안에 append 된다 -->
    </div>
    <aside id="side-panel">
      <div class="panel-placeholder">KPI Dashboard</div>
    </aside>
  </main>

  <!-- 하단 상태바: 시뮬레이션 시간 · 가동 상태 · 누적 완성품 (main.js가 매 프레임 갱신) -->
  <footer id="statusbar">
    <span id="status-text">시뮬레이션 시간: 00:00:00 | 대기 중 | 누적 완성품: 0개</span>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
